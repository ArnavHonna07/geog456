<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider</title>
</head>

<style>
    body{
        background-color: black;
        font-size:20px;
        color:white
    }
    div#image_container{
        top: 20%;
        
    }
    img{
        height:80%;
        position: absolute;
    }

    #before{
        z-index: 1;
        opacity: 1;
    }
    #after{
        z-index: 3;
        opacity: 0;
    }

datalist {
  display: flex;
  flex-direction: row;
  justify-content: space-between;
  width: 400px;
}

option {
  padding: 0;
}

input {
  width: 400px;
  margin: 0;
}

p {
    padding-top: 1%;
    padding-right: 5%;
    padding-left: 70%;
    font-size: 30px;
}
</style>
<body>

    <label for="year">St.Mary's Glacier</label><br />

    <input type="range" id="year" name="year" list="tickmarks" value="0" oninput="myFunction(this.value)"/>

    <datalist id="tickmarks">
        <option value="0" label="Before"></option>
        <option value="100" label="After"></option>
    </datalist>

    <div id="image_container">
        <img id="after"  src="./StMaryGlacier_2023.png" alt="2023">
        <img id="before" src="./HistogramMatched_StMaryGlacier_2011.png" alt="2011">
    </div>

    <script>
        function myFunction(e) {
            console.log(e)
            document.getElementById("after").style.opacity = e/100;
        }
    </script>

    <p>
        These images show how St.Mary's Glacier in Colorado has changed since 2011. It has significantly receded as can be seen in the upper right and through the valley near the lakes.
    </p>
</body>
</html>
