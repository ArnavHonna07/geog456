    <h1>Movement of the Achaemenid and Islamic identity in Iran upto the late 19th century</h1>
    <div id="map"></div>
    
    
    <script>
        var map = L.map('map').setView([32.15, 54.34], 5.2);
        
        // WMTS basemap from OldMapsOnline
        var modernIranLayer = L.tileLayer('https://wmts.oldmapsonline.org/maps/fd0bd384-a1f3-4330-8c0b-0e062f832da1/2025-10-21T08:25:26.453756Z/{z}/{x}/{y}.png?key=mpedHnQVShodfUBtWv5O')
        .addTo(map);

        var Tehranmarker = L.marker([35.72, 51.33]).addTo(map);
        var Isfahanmarker = L.marker([32.65, 51.66]).addTo(map);
        var Persepolismarker = L.marker([29.93, 52.88]).addTo(map);
        var Pasargadaemarker = L.marker([30.19, 53.18]).addTo(map);
        var Bisitunmarker = L.marker([34.39, 47.43]).addTo(map);

        var teh = [35.72, 51.33],
            isf = [32.65, 51.66],
            per = [29.93, 52.88],
            pas = [30.19, 53.18],
            bis = [34.39, 47.43];
        
        var route = L.featureGroup([
			L.marker(bis).bindPopup(<b>"Bisitun: "</b> + "Inscription that creates the Achaemenid identity. Commissioned by Darius"),
			L.polyline([bis, pas]),
			L.marker(pas).bindPopup(<b>"Pasargadae: "</b> + "Capital city of Cyrus. Also where the Tomb of Cyrus is located"),
			L.polyline([pas, per]),
			L.marker(per).bindPopup(<b>"Persepolis: "</b> + "Capital city of Darius"),
			L.polyline([per, teh]),
			L.marker(teh).bindPopup(<b>"Tehran: "</b> + "Capital city of Modern Iran"),
			L.polyline([teh, isf]),
			L.marker(isf).bindPopup(<b>"Isfahan: "</b> + "Capital city of the Safavids who converted Iran to Shi'i Islam")
		], {snakingPause: 200});

        map.fitBounds(route.getBounds());

        route.addTo(map).snakeIn();
