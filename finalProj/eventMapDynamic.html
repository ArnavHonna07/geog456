<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eventDynamic</title>

    <!-- leaflet scripts -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""/>
        
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>
    

    <style>
        h1{
            position: relative;
            left: 10%;
            font: 'palatino';
        }
        #map{
            width: 1000px;
            height: 800px;
            position: relative;
            left: 20%;
            right: 20%;
        }
        body{
            background-image:url('https://github.com/ArnavHonna07/geog456/blob/main/finalProj/data/imgs/brown.jpg?raw=true');
            background-size: cover;
        }
    </style>
</head>
<body>
    
    <h1 style="color: #ffcc99;">Movement of the two identities debated within the nationalist discourse in Iran since the late 19th century</h1>
    <div id="map"></div>
    
    <script>
        // set map view and zoom
        var map = L.map('map').setView([32.64, 53.90], 5.5);
        
        // 1926 map of Iran (WMTS basemap from OldMapsOnline)
        var modernIranLayer = L.tileLayer('https://wmts.oldmapsonline.org/maps/fd0bd384-a1f3-4330-8c0b-0e062f832da1/2025-10-21T08:25:26.453756Z/{z}/{x}/{y}.png?key=mpedHnQVShodfUBtWv5O')
        .addTo(map);

        // make variables with lat/long of each place                    
        var bis = L.latLng(34.39, 47.43);
        var pas = L.latLng(30.19, 53.18);
        var per = L.latLng(29.93, 52.88);
        var isf = L.latLng(32.65, 51.66);
        var teh = L.latLng(35.72, 51.33);

        // create paths
        var path1 = [bis, pas]; // bisitun to pasargadae
        var path2 = [bis, per]; // bisitun to persepolis
        var path3 = [per, teh]; // persepolis to tehran
        var path4 = [isf, teh]; // isfahan to tehran

    </script>
</body>
</html>
