<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eventStatic</title>

    <!-- leaflet scripts -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""/>
        
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>
    
    <!-- arrowhead scripts from: https://github.com/slutske22/leaflet-arrowheads -->
    <script src="https://unpkg.com/leaflet-geometryutil@0.10.0/src/leaflet.geometryutil.js"></script>
    <script src="https://unpkg.com/leaflet-arrowheads@1.4.0/src/leaflet-arrowheads.js"></script>
    
    <style>
        h1{
            position: relative;
            left: 10%;
            font: 'palatino';
        }
        #map{
            width: 1000px;
            height: 800px;
            position: relative;
            left: 20%;
            right: 20%;
        }

    </style>
</head>
<body style="background-color: #663300;">
    
    <h1 style="color: #ffcc99;">Movement of the two identities debated within the nationalist discourse in Iran since the late 19th century</h1>
    <div id="map"></div>

    <script>
        // set map view and zoom
        var map = L.map('map').setView([32.64, 53.90], 5.5);
        
        // 1926 map of Iran (WMTS basemap from OldMapsOnline)
        var modernIranLayer = L.tileLayer('https://wmts.oldmapsonline.org/maps/fd0bd384-a1f3-4330-8c0b-0e062f832da1/2025-10-21T08:25:26.453756Z/{z}/{x}/{y}.png?key=mpedHnQVShodfUBtWv5O')
        .addTo(map);
        
       // make variables with lat/long of each place                    
        var bis = L.latLng(34.39, 47.43);
        var pas = L.latLng(30.19, 53.18);
        var per = L.latLng(29.93, 52.88);
        var isf = L.latLng(32.65, 51.66);
        var teh = L.latLng(35.72, 51.33);

        // create paths
        var path1 = [bis, pas]; // bisitun to pasargadae
        var path2 = [bis, per]; // bisitun to persepolis
        // var path3 = [pas, bis]; // pasargadae (tomb of cyrus) to bisitun
        var path4 = [per, teh]; // persepolis to tehran
        var path5 = [isf, teh]; // isfahan to tehran

        // from bisitun to pasargadae
        var event1 = L.polyline(path1, {
            color: 'black'
        }).arrowheads({
            size: '8px',
            fill: true,
            frequency: '45px'
        }).bindPopup("Achaemenid identity is reinforced in Pasargadae through inscriptions put up by Darius that portray Cyrus as an Achaemenid.<br/>" + " <br/> Consequently, the Tomb of Cyrus reinforces the Achaemenid identity due to its use as an investiture site for new kings.")
        .addTo(map);
        
        // from bisitun to persepolis
        var event2 = L.polyline(path2, {
            color: 'black'
        }).arrowheads({
            size: '8px',
            fill: true,
            frequency: '45px'
        }).bindPopup("Achaemenid identity is reinforced in Darius' capital city")
        .addTo(map);
        
        // i wasnt able to figure out a way to prevent overlapping lines, 
        // so i just combined event3 with event1

        // from pasargadae (tomb of cyrus) back to bisitun
        // var event3 = L.polyline(path3, {
        //     color: 'black',
        //     opacity: 1
        // }).bindPopup("Tomb of Cyrus reinforces the Achaemenid identity due to its use as an investiture site for new kings")
        // .addTo(map);
        
        // from persepolis to tehran
        var event4 = L.polyline(path4, {
            color: 'black',
            opacity: 1
        }).arrowheads({
            size: '8px',
            fill: true,
            frequency: '45px'
        }).bindPopup("In the late 19th century, Achaemenid identity enters the nationalist discourse after archaeological discoveries in Persepolis")
        .addTo(map);
        
        // from isfahan to tehran
        var event5 = L.polyline(path5, {
            color: 'black',
            opacity: 1
        }).arrowheads({
            size: '8px',
            fill: true,
            frequency: '45px'
        }).bindPopup("In the late 19th century, Iran's Islamic identity contends with the Achaemenid identity in the nationalist discourse")
        .addTo(map);
        
        // create icon
        var myIcon = L.icon({
        iconUrl: 'https://github.com/ArnavHonna07/geog456/blob/main/finalProj/data/imgs/icon3.png?raw=true',    
        iconSize: [25,25]
        });

        // place markers
        var tehranMarker= L.marker([35.72, 51.33], {icon: myIcon})
                            .bindPopup("<b>Tehran: </b>" + "Capital city of Modern Iran")
                            .addTo(map);
        var isfahanMarker = L.marker([32.65, 51.66], {icon: myIcon})
                            .bindPopup("<b>Isfahan: </b>" + "Capital city of the Safavids who converted Iran to Shi'i Islam")
                            .addTo(map);
        var persepolisMarker = L.marker([29.93, 52.88], {icon: myIcon})
                            .bindPopup("<b>Persepolis: </b>" + "Capital city of Darius")
                            .addTo(map);
        var pasargadaeMarker = L.marker([30.19, 53.18], {icon: myIcon})
                            .bindPopup("<b>Pasargadae: </b>" + "Capital city of Cyrus. Also where the Tomb of Cyrus is located")
                            .addTo(map);
        var bisitunMarker = L.marker([34.39, 47.43], {icon: myIcon})
                            .bindPopup("<b>Bisitun Inscription: </b>" + "Inscription that creates the Achaemenid identity. Commissioned by Darius")
                            .addTo(map);

        // create info box                    
        var popup = L.popup()
        .setLatLng([36.95, 58.87])
        .setContent('<div style= "font-size: 25px;color:red">Click on the markers and lines for more context! (you can close this popup)</div>')
        .openOn(map);

       
    </script>
    
</body>
</html>
